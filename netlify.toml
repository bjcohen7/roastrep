[build]
  command = "corepack pnpm build"
  publish = ".next"

[build.environment]
  NEXT_TELEMETRY_DISABLED = "1"
  NODE_VERSION = "20"

[functions]
  node_bundler = "esbuild"
  # Request the maximum allowed function timeout (26 s on Pro, 10 s on Starter).
  # This is a hint to Netlify; the actual limit depends on the plan.
  timeout = 26

